name: SMB Test Server CI/CD

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') || github.event_name == 'pull_request'
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: camel-smb-test-server:test

      - name: Install SMB client
        run: |
          sudo apt-get update
          sudo apt-get install -y smbclient

      - name: Start SMB container
        run: |
          docker run -d \
            --name smb-test \
            -p 445:445 \
            -p 139:139 \
            -e SMB_USER=testuser \
            -e SMB_PASSWORD=testPassword123 \
            camel-smb-test-server:test

          # Give the container initial time to start
          echo "Waiting for container to initialize..."
          sleep 10

          # Wait for SMB server to be ready with retry logic
          echo "Waiting for SMB authentication to be ready..."
          for i in {1..40}; do
            echo "Attempt $i: Testing SMB connection..."
            if smbclient -L localhost -U testuser%testPassword123 2>/dev/null; then
              echo "✅ SMB server is ready!"
              break
            fi
            if [ $i -eq 40 ]; then
              echo "❌ SMB server failed to start after 40 attempts"
              docker logs smb-test
              exit 1
            fi
            sleep 3
          done

          # Check container is running
          docker ps | grep smb-test

      - name: Test SMB connection and file operations
        run: |
          # Test listing shares
          echo "Testing SMB share listing..."
          smbclient -L localhost -U testuser%testPassword123

          # Create a test file
          echo "Test content from GitHub Actions" > test-upload.txt

          # Test upload to read-write share
          echo "Testing file upload to read-write share..."
          smbclient //localhost/data-rw -U testuser%testPassword123 -c "put test-upload.txt test-from-ci.txt"

          # Test download from read-write share (one of the pre-created files)
          echo "Testing file download from read-write share..."
          smbclient //localhost/data-rw -U testuser%testPassword123 -c "get 1.txt downloaded-rw.txt"
          cat downloaded-rw.txt

          # Test download from read-only share
          echo "Testing file download from read-only share..."
          smbclient //localhost/data-ro -U testuser%testPassword123 -c "get 1.txt downloaded-ro.txt"
          cat downloaded-ro.txt

          # Verify upload worked
          echo "Verifying uploaded file..."
          smbclient //localhost/data-rw -U testuser%testPassword123 -c "get test-from-ci.txt verify.txt"
          cat verify.txt

          echo "✅ All SMB tests passed!"

      - name: Show container logs on failure
        if: failure()
        run: docker logs smb-test

      - name: Cleanup
        if: always()
        run: docker rm -f smb-test || true

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.CONTAINER_REPO_USERNAME }}
          password: ${{ secrets.CONTAINER_REPO_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Tag push - use the tag name
            TAG=${GITHUB_REF#refs/tags/}
            echo "tags=quay.io/jamesnetherton/camel-smb-test-server:${TAG}" >> $GITHUB_OUTPUT
            echo "Building and pushing tag: ${TAG}"
          else
            # Main branch push - use 'latest'
            echo "tags=quay.io/jamesnetherton/camel-smb-test-server:latest" >> $GITHUB_OUTPUT
            echo "Building and pushing: latest"
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/ppc64le,linux/s390x
          push: true
          tags: ${{ steps.tags.outputs.tags }}
