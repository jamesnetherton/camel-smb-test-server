[global]
	workgroup = SAMBA
	security = user
	passdb backend = tdbsam
	ntlm auth = yes
	load printers = no
	disable spoolss = yes

[data-rw]
	comment = Read-write share for testing
	path = /data/rw
	writeable = yes
	browsable = yes
	guest ok = no
	valid users = camel
	create mask = 0664
	directory mask = 0775

[data-ro]
	comment = Read-only share for testing
	path = /data/ro
	writeable = no
	browsable = yes
	guest ok = no
	valid users = camel